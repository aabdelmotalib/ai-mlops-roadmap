site_name: Complete Programming Roadmap
site_description: From Python Basics to Production ML Systems
site_author: Your Name
site_url: https://example.com

theme:
  name: material
  features:
    # Navigation sidebar features
    - navigation.sections # Enable section grouping in sidebar
    - navigation.expand # Expand all sections by default
    - navigation.instant # Instant page loading
    - navigation.path # Show breadcrumb path
    # Table of Contents features
    - toc.integrate # Integrate TOC into sidebar
    - toc.follow # Follow scroll position in TOC
    # Search features
    - search.suggest # Show search suggestions
    - search.highlight # Highlight search results
    - search.share # Share search results
    # Content features
    - content.code.copy # Copy code button
    - content.code.annotate # Annotate code
    - content.tabs.link # Link tabs
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to Dark Mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to Light Mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Phase 0 - Fundamentals:
      - Overview: phase_0/index.md
      - Module 1 - Python Essentials: phase_0/module_1/module_1.md
      - Module 2 - Control Flow: phase_0/module_2/module_2.md
      - Module 3 - Data Structures: phase_0/module_3/module_3.md
      - Module 4 - Functions & Scope: phase_0/module_4/module_4.md
      - Module 5 - Debugging: phase_0/module_5/module_5.md
  - Phase 1 - Web Fundamentals:
      - Overview: phase_1/index.md
      - Module 1 - HTTP & APIs: phase_1/module_1/module_1.md
      - Module 2 - Web Scraping: phase_1/module_2/module_2.md
      - Module 3 - Working with Data: phase_1/module_3/module_3.md
      - Module 4 - Databases Basics: phase_1/module_4/module_4.md
      - Module 5 - Building Your First API: phase_1/module_5/module_5.md
  - Phase 2 - Automation:
      - Overview: phase_2/index.md
      - Module 1 - Virtual Environments: phase_2/module_1/module_1.md
      - Module 2 - Data Pipelines: phase_2/module_2/module_2.md
      - Module 3 - Workflow Orchestration: phase_2/module_3/module_3.md
      - Module 4 - CI/CD Basics: phase_2/module_4/module_4.md
      - Module 5 - Infrastructure as Code: phase_2/module_5/module_5.md
  - Phase 3 - Machine Learning:
      - Overview: phase_3/index.md
      - Module 1 - ML Fundamentals: phase_3/module_1/module_1.md
      - Module 2 - Model Training: phase_3/module_2/module_2.md
      - Module 3 - Feature Engineering: phase_3/module_3/module_3.md
      - Module 4 - Model Evaluation: phase_3/module_4/module_4.md
      - Module 5 - Model Deployment: phase_3/module_5/module_5.md
  - Phase 4 - Production Systems:
      - Overview: phase_4/index.md
      - Module 1 - Background Tasks: phase_4/module_1/module_1.md
      - Module 2 - Message Queues: phase_4/module_2/module_2.md
      - Module 3 - Scheduling & Retries: phase_4/module_3/module_3.md
      - Module 4 - Logging & Monitoring: phase_4/module_4/module_4.md
      - Module 5 - Service Integration: phase_4/module_5/module_5.md
  - Phase 5 - Analytics:
      - Overview: phase_5/index.md
      - Module 1 - SQL for Analytics: phase_5/module_1/module_1.md
      - Module 2 - Building Dashboards: phase_5/module_2/module_2.md
      - Module 3 - Pipeline Metrics: phase_5/module_3/module_3.md
      - Module 4 - System Monitoring: phase_5/module_4/module_4.md
      - Module 5 - Visualizing Results: phase_5/module_5/module_5.md
  - Phase 6 - MLOps & Deployment:
      - Overview: phase_6/index.md
      - Module 1 - Docker Compose: phase_6/module_1/module_1.md
      - Module 2 - Containerization: phase_6/module_2/module_2.md
      - Module 3 - CI/CD Pipelines: phase_6/module_3/module_3.md
      - Module 4 - Experiment Tracking: phase_6/module_4/module_4.md
      - Module 5 - Production Monitoring: phase_6/module_5/module_5.md
  - Tags: tags.md

plugins:
  - search:
      lang: en
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2-4

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com

site_name: "The AI & MLOps Engineer Roadmap"
site_description: "A complete beginner-to-engineer learning journey through Data, AI, and MLOps — explained step by step, like a mentor."
site_author: "Your Name"
docs_dir: docs
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    # Navigation
    - navigation.tabs               # Top-level tabs per phase
    - navigation.tabs.sticky        # Tabs stay visible while scrolling
    - navigation.sections           # Grouped sections in sidebar
    - navigation.expand             # Auto-expand sidebar sections
    - navigation.path               # Breadcrumbs (shows where you are)
    - navigation.top                # Back-to-top button
    - navigation.indexes            # Allow section index pages
    - navigation.footer             # Previous/Next links at page bottom

    # Search
    - search.highlight              # Highlight search terms on page
    - search.suggest                # Autocomplete suggestions
    - search.share                  # Shareable search links

    # Content
    - content.code.copy             # Copy button on all code blocks
    - content.code.annotate         # Inline code annotations
    - content.tabs.link             # Sync content tabs across the page
    - content.tooltips              # Hover tooltips on links

    # Table of contents
    - toc.follow                    # TOC highlights as you scroll
    - toc.integrate                 # TOC integrated into sidebar

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

# ─── Plugins ────────────────────────────────────────────────────────────────
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - tags:
      tags_file: tags.md            # Central tags index page
  - glightbox                       # Clickable/zoomable images & diagrams

# ─── Markdown Extensions ─────────────────────────────────────────────────────
markdown_extensions:
  # Admonitions (Note, Tip, Warning, Danger boxes)
  - admonition
  - pymdownx.details                # Collapsible admonition blocks
  - pymdownx.superfences:           # Fenced code blocks + Mermaid diagrams
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Code
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite           # Inline `code` highlighting
  - pymdownx.snippets               # Include code from external files

  # Content features
  - pymdownx.tabbed:
      alternate_style: true         # Material-style tabbed content
  - pymdownx.tasklist:
      custom_checkbox: true         # ✅ Checkboxes for exercises
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys                   # Keyboard key styling: ++ctrl+c++
  - pymdownx.mark                   # ==Highlighted text==
  - pymdownx.critic                 # Tracked changes / review markup
  - pymdownx.caret                  # Superscript: H^2^O
  - pymdownx.tilde                  # Subscript + ~~strikethrough~~
  - pymdownx.smartsymbols           # Auto-convert (c) → ©

  # Tables & layout
  - tables
  - attr_list
  - md_in_html
  - def_list                        # Definition lists
  - footnotes
  - toc:
      permalink: true               # Anchor links on every heading
      toc_depth: 3

# ─── Extra ──────────────────────────────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/your-profile

  tags:
    Beginner: beginner
    Intermediate: intermediate
    Python: python
    Git: git
    Docker: docker
    Linux: linux
    SQL: sql
    APIs: apis
    Scraping: scraping
    Airflow: airflow
    dbt: dbt
    ML: ml
    MLOps: mlops
    Celery: celery
    Redis: redis
    FastAPI: fastapi
    Monitoring: monitoring
    CI/CD: cicd
    MLflow: mlflow
    Exercise: exercise
    Project: project

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

